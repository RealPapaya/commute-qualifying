<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d12">
  <title>Commute Qualifying</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="topbar">
    <h1>COMMUTE<span>QUALIFYING</span></h1>
    <nav id="tabs">
      <button data-view="routes" class="tab active">Routes</button>
      <button data-view="editor" class="tab" disabled>Editor</button>
      <button data-view="run" class="tab" disabled>Run</button>
      <button data-view="history" class="tab">History</button>
    </nav>
  </header>

  <!-- Routes list -->
  <section id="view-routes" class="view active">
    <div class="panel">
      <div class="panel-head">
        <h2>My Routes</h2>
        <button id="btn-new-route" class="btn primary">+ New Route</button>
      </div>
      <ul id="route-list" class="route-list"></ul>
      <p class="hint" id="routes-empty">No routes yet. Create one, then trace your commute on the map.</p>
    </div>
  </section>

  <!-- Route editor -->
  <section id="view-editor" class="view">
    <div id="editor-map" class="map"></div>
    <div class="panel editor-panel">
      <div class="panel-head">
        <input id="route-name" class="name-input" placeholder="Route name" maxlength="40">
        <span id="route-stats" class="stats"></span>
      </div>
      <div class="toolbar" id="editor-toolbar">
        <button data-tool="trace" class="btn tool active" title="Click map to add waypoints">✏️ Trace</button>
        <button data-tool="light" class="btn tool" title="Click route to mark a traffic light">🚦 Lights</button>
        <button data-tool="sector" class="btn tool" title="Drag sector boundaries along the route">⏱ Sectors</button>
        <label class="toggle"><input type="checkbox" id="snap-toggle" checked> Snap to roads</label>
      </div>
      <div id="tool-help" class="hint"></div>
      <div class="toolbar">
        <button id="btn-undo-wp" class="btn">↩ Undo point</button>
        <button id="btn-clear-route" class="btn danger">Clear trace</button>
        <button id="btn-add-sector" class="btn">+ Sector</button>
        <button id="btn-remove-sector" class="btn">− Sector</button>
        <button id="btn-save-route" class="btn primary">Save</button>
      </div>
      <div id="sector-summary" class="sector-summary"></div>
    </div>
  </section>

  <!-- Run -->
  <section id="view-run" class="view">
    <div id="run-map" class="map"></div>
    <div class="panel run-panel">
      <div id="run-status" class="run-status">Press ARM, then drive. Timing starts when you cross the start line.</div>
      <div id="run-clock" class="run-clock">--:--.-</div>
      <div id="sector-board" class="sector-board"></div>
      <div class="toolbar">
        <button id="btn-arm" class="btn primary big">ARM GPS</button>
        <button id="btn-abort" class="btn danger" hidden>Abort</button>
        <button id="btn-simulate" class="btn">▶ Simulate run</button>
      </div>
      <div id="gps-info" class="hint"></div>
    </div>
  </section>

  <!-- History -->
  <section id="view-history" class="view">
    <div class="panel">
      <div class="panel-head"><h2>Run History &amp; Personal Bests</h2></div>
      <div id="best-board"></div>
      <ul id="run-history" class="run-list"></ul>
      <p class="hint" id="history-empty">No completed runs yet.</p>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
